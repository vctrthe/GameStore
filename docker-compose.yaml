services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: keycloak
    ports:
      - 8080:8080
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    command: ["start-dev"]
    networks:
      - keycloak
    volumes:
      - keycloak-data:/opt/keycloak/data

volumes:
  keycloak-data:

networks:
  keycloak:
    driver: bridge